# ============================================================
# HeAgent 生产部署 docker-compose 配置
# 使用方式:
#   # 1) 复制 .env.production.example → .env.production 并填入 API key
#   # 2) docker-compose run --rm heagent "你的问题"  # 单次执行
#   # 3) docker-compose run --rm heagent             # 交互模式
# ============================================================

services:
  heagent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: heagent
    restart: unless-stopped

    # 环境变量（需先创建 .env.production 并填入 API key）
    # 模板见 .env.production.example
    env_file:
      - .env.production
    environment:
      # 运行时数据持久化目录
      - HEAGENT_DATA_DIR=/data/heagent
      # 日志级别（生产环境建议 WARNING 减少日志量）
      - LOG_LEVEL=WARNING

    volumes:
      # 持久化运行时数据（技能、记忆、会话等）
      - heagent_data:/data/heagent
      # 绑定宿主 .env 文件，避免每次重建
      - ./.env.production:/app/.env:ro

    # 资源限制
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M

    # 安全配置
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  heagent_data:
    driver: local
