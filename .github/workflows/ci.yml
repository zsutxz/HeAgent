name: CI

on:
  push:
    branches: [master, feat/module-integration]
  pull_request:
  workflow_dispatch:  # 手动触发（含 integration 测试）

jobs:
  # ── Lint + Security job（单次运行，不随矩阵重复）──
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check src tests

      - name: Ruff format check
        run: ruff format --check src tests

      - name: Mypy (strict)
        run: mypy src

      - name: Bandit (security scan)
        run: bandit -r src/ -ll

      - name: pip-audit (dependency vulns)
        run: pip-audit
        continue-on-error: true  # LOW 告警不 fail CI

  # ── 测试矩阵（多平台 × 多 Python 版本）──
  test:
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install
        run: pip install -e ".[dev]"

      - name: Test
        run: pytest -q --tb=short -m "not integration and not benchmark"

  # ── 覆盖率（仅在 ubuntu + 3.11 上跑以节省资源）──
  coverage:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: pip install -e ".[dev]"

      - name: Test + coverage
        run: pytest --cov=heagent --cov-report=term-missing --cov-fail-under=88 -m "not integration and not benchmark"

  # ── 集成测试（手动触发或 workflow_dispatch）──
  integration:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: pip install -e ".[dev]"

      - name: Integration tests
        run: pytest -q --tb=long -m "integration"
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
