name: CI

on:
  push:
    branches: [master, feat/module-integration]
    tags: ["v*"]  # 推送 v0.3.1 等 tag 触发发布
  pull_request:
  workflow_dispatch:  # 手动触发（含 integration 测试 + 可选发布）

jobs:
  # ── Lint + Security job（单次运行，不随矩阵重复）──
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check src tests

      - name: Ruff format check
        run: ruff format --check src tests

      - name: Mypy (strict)
        run: mypy src

      - name: Bandit (security scan)
        run: bandit -r src/ -ll

      - name: pip-audit (dependency vulns)
        run: pip-audit
        continue-on-error: true  # LOW 告警不 fail CI

  # ── 测试矩阵（多平台 × 多 Python 版本）──
  test:
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.11", "3.12", "3.13", "3.14-dev"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Test
        # 3.14-dev 允许失败（预发布不稳定）
        continue-on-error: ${{ matrix.python == '3.14-dev' }}
        run: pytest -q --tb=short -m "not integration and not benchmark"

  # ── 覆盖率（仅在 ubuntu + 3.11 上跑以节省资源）──
  coverage:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Test + coverage
        run: pytest --cov-fail-under=87 -m "not integration and not benchmark"

      - name: Coverage HTML report
        run: coverage html

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov/
          retention-days: 7

  # ── Benchmark 性能回归检测 ──
  benchmark:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Download previous benchmark data
        uses: actions/download-artifact@v4
        with:
          name: benchmark-data
          path: benchmark-data/
        continue-on-error: true

      - name: Run benchmarks
        run: pytest --benchmark-only --benchmark-autosave -m benchmark

      - name: Upload benchmark data
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-data
          path: benchmark-data/
          retention-days: 7

      - name: Compare benchmarks
        if: success()
        run: |
          if ls benchmark-data/*.json 2>/dev/null | head -1; then
            echo "## Benchmark comparison" >> $GITHUB_STEP_SUMMARY
            pytest-benchmark compare --group=group,func benchmark-data/*.json >> $GITHUB_STEP_SUMMARY 2>&1 || true
          else
            echo "No previous benchmark data — skipping comparison" >> $GITHUB_STEP_SUMMARY
          fi
        continue-on-error: true

  # ── 供应链安全审查（PR 触发）──
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4

  # ── 集成测试（手动触发或 workflow_dispatch）──
  integration:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Integration tests
        run: pytest -q --tb=long -m "integration"
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

  # ════════════════════════════════════════════════════════
  # Release — PyPI publish + Docker push (GHCR + Docker Hub)
  # 触发: tag push (v*) 或 workflow_dispatch
  # 前置: lint + test + coverage 全部通过
  # ════════════════════════════════════════════════════════
  release:
    name: Release — PyPI publish & Docker push
    runs-on: ubuntu-latest
    needs: [lint, test, coverage]
    if: ${{ startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' }}
    environment: release  # 强制审批门 (GitHub Environments 保护)
    permissions:
      id-token: write      # PyPI Trusted Publisher OIDC
      contents: read
      packages: write      # GHCR push
      attestations: write  # 可选: 镜像签名

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 提取版本号（优先用 tag，否则从 pyproject.toml 读取）──
      - name: Extract version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="$(grep 'version = ' pyproject.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')"
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "Release version: ${VERSION}"

      # ── 构建 wheel + sdist ──
      - name: Build package
        run: |
          pip install build
          python -m build

      # ── 验证 wheel ──
      - name: Verify wheel
        run: |
          pip install twine
          twine check dist/*

      # ── PyPI publish (Trusted Publisher OIDC，零 secret) ──
      # 注意: 需先在 PyPI 项目设置中配置 Trusted Publisher:
      #   Owner: zsutxz
      #   Repository: HeAgent
      #   Workflow: ci.yml
      #   Environment: release
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

      # ── Docker setup ──
      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Login to GHCR (GitHub Container Registry, 零额外 secret) ──
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Login to Docker Hub ──
      # 前置: 在 GitHub repo Settings → Secrets and variables → Actions
      #   添加 DOCKERHUB_USERNAME 和 DOCKERHUB_TOKEN (access token, 非密码)
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Docker build + push (multi-arch, GHCR + Docker Hub) ──
      # Dockerfile 使用 ARG 控制 digest 锁定，CI 注入版本号用于 OCI labels
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ env.VERSION }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/heagent:latest
            ghcr.io/${{ github.repository_owner }}/heagent:${{ env.VERSION }}
            ${{ secrets.DOCKERHUB_USERNAME }}/heagent:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/heagent:${{ env.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
