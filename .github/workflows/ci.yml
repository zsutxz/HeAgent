name: CI

on:
  push:
    branches: [master, feat/module-integration]
  pull_request:
  workflow_dispatch:  # 手动触发（含 integration 测试）

jobs:
  # ── Lint + Security job（单次运行，不随矩阵重复）──
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check src tests

      - name: Ruff format check
        run: ruff format --check src tests

      - name: Mypy (strict)
        run: mypy src

      - name: Bandit (security scan)
        run: bandit -r src/ -ll

      - name: pip-audit (dependency vulns)
        run: pip-audit
        continue-on-error: true  # LOW 告警不 fail CI

  # ── 测试矩阵（多平台 × 多 Python 版本）──
  test:
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.11", "3.12", "3.13", "3.14-dev"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Test
        # 3.14-dev 允许失败（预发布不稳定）
        continue-on-error: ${{ matrix.python == '3.14-dev' }}
        run: pytest -q --tb=short -m "not integration and not benchmark"

  # ── 覆盖率（仅在 ubuntu + 3.11 上跑以节省资源）──
  coverage:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Test + coverage
        run: pytest --cov-fail-under=87 -m "not integration and not benchmark"

      - name: Coverage HTML report
        run: coverage html

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov/
          retention-days: 7

  # ── Benchmark 性能回归检测 ──
  benchmark:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Download previous benchmark data
        uses: actions/download-artifact@v4
        with:
          name: benchmark-data
          path: benchmark-data/
        continue-on-error: true

      - name: Run benchmarks
        run: pytest --benchmark-only --benchmark-autosave -m benchmark

      - name: Upload benchmark data
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-data
          path: benchmark-data/
          retention-days: 7

      - name: Compare benchmarks
        if: success()
        run: |
          if ls benchmark-data/*.json 2>/dev/null | head -1; then
            echo "## Benchmark comparison" >> $GITHUB_STEP_SUMMARY
            pytest-benchmark compare --group=group,func benchmark-data/*.json >> $GITHUB_STEP_SUMMARY 2>&1 || true
          else
            echo "No previous benchmark data — skipping comparison" >> $GITHUB_STEP_SUMMARY
          fi
        continue-on-error: true

  # ── 供应链安全审查（PR 触发）──
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4

  # ── 集成测试（手动触发或 workflow_dispatch）──
  integration:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Integration tests
        run: pytest -q --tb=long -m "integration"
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
