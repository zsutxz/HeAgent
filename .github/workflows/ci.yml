name: CI

on:
  push:
    branches: [master, feat/module-integration]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check src tests

      - name: Ruff format check
        run: ruff format --check src tests

      - name: Mypy (strict)
        run: mypy src

      - name: Test + coverage
        run: pytest --cov=heagent --cov-report=term-missing --cov-fail-under=80
